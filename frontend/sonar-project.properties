# SonarQube — Frontend project configuration
sonar.projectKey=ecommerce-frontend
sonar.projectName=ECommerce Frontend
sonar.projectVersion=1.0

sonar.sources=src
sonar.exclusions=**/node_modules/**,**/*.spec.ts,**/dist/**,**/coverage/**,src/environments/**

sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

# Security hotspot detection
sonar.security.sources.javasecurity=OWASP_TOP_10_2021

# Quality Gate: fail on new issues
sonar.qualitygate.wait=true
