name: Frontend CI — Build & Push to ACR

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'

env:
  NODE_VERSION: '20'
  IMAGE_NAME: ecommerce-frontend

jobs:
  build-push:
    name: Build Angular, Docker Image & Push to ACR
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit package-lock.json back to the repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Commit package-lock.json if generated
        if: github.event_name == 'push'
        run: |
          if git diff --quiet frontend/package-lock.json 2>/dev/null && git ls-files --error-unmatch frontend/package-lock.json 2>/dev/null; then
            echo "package-lock.json unchanged, nothing to commit"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add frontend/package-lock.json
            git commit -m "chore: add/update package-lock.json [skip ci]"
            git push
            echo "package-lock.json committed and pushed"
          fi

      - name: Build production artifact
        working-directory: frontend
        run: npm run build:prod

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image_latest=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.tags.outputs.image_tag }} \
            --tag ${{ steps.tags.outputs.image_latest }} \
            --label "build.sha=${{ github.sha }}" \
            --label "build.ref=${{ github.ref }}" \
            --file frontend/Dockerfile \
            frontend/

      - name: Login to ACR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push image to ACR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          docker push ${{ steps.tags.outputs.image_tag }}
          docker push ${{ steps.tags.outputs.image_latest }}

      - name: Summary
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          echo "### Frontend image pushed to ACR" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${{ steps.tags.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Latest: \`${{ steps.tags.outputs.image_latest }}\`" >> $GITHUB_STEP_SUMMARY