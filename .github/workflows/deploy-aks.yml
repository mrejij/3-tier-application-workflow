name: Deploy to AKS (Manual)
# Automated deployment is disabled.
# Deploy manually from your laptop:
#
#   az aks get-credentials --resource-group rg-ecommerce-dev --name aks-ecommerce-dev
#   kubectl apply -f k8s/namespace.yaml
#   kubectl apply -f k8s/configmaps/ -n ecommerce
#   kubectl apply -f k8s/backend/  -n ecommerce
#   kubectl apply -f k8s/frontend/ -n ecommerce
#   kubectl apply -f k8s/ingress/  -n ecommerce
#
# Replace IMAGE_TAG_PLACEHOLDER in deployment.yaml with the ACR image tag
# printed at the end of the backend-ci or frontend-ci workflow run.

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Deployment is manual  see comments above'
        required: false

jobs:
  info:
    name: Manual deployment reminder
    runs-on: ubuntu-latest
    steps:
      - name: Print reminder
        run: |
          echo "Deploy manually from your laptop using kubectl."
          echo "See workflow comments for the full command sequence."