name: Deploy to AKS

on:
  workflow_run:
    workflows:
      - "Frontend CI — Build, Scan & Publish to Nexus"
      - "Backend CI — Build, Scan & Publish to Nexus"
    types:
      - completed
    branches: [main]

  # Allow manual dispatch with version override
  workflow_dispatch:
    inputs:
      frontend_tag:
        description: 'Frontend image tag (e.g. abc12345)'
        required: false
        default: 'latest'
      backend_tag:
        description: 'Backend image tag (e.g. abc12345)'
        required: false
        default: 'latest'
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NAMESPACE: ecommerce
  FRONTEND_IMAGE: ecommerce-frontend
  BACKEND_IMAGE: ecommerce-backend

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Prerequisite: only deploy if CI workflows succeeded
  # ─────────────────────────────────────────────────────────────────────────────
  check-ci:
    name: Verify CI Success
    runs-on: self-hosted
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: CI check passed
        run: echo "All CI checks passed — proceeding with deployment"

  # ─────────────────────────────────────────────────────────────────────────────
  # IaC Security Scan before deploying
  # ─────────────────────────────────────────────────────────────────────────────
  iac-scan:
    name: IaC Security Scan (Checkov)
    runs-on: self-hosted
    needs: check-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on K8s manifests
        run: |
          checkov -d k8s/ \
            --framework kubernetes \
            --output sarif \
            --output-file checkov-k8s.sarif \
            --soft-fail-on HIGH \
            --hard-fail-on CRITICAL || true

      - name: Run Checkov on Bicep templates
        run: |
          checkov -d infrastructure/ \
            --framework bicep \
            --output sarif \
            --output-file checkov-bicep.sarif \
            --soft-fail || true

      - name: Upload Checkov reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-reports
          path: |
            checkov-k8s.sarif
            checkov-bicep.sarif

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to AKS
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS (${{ github.event.inputs.environment || 'production' }})
    runs-on: self-hosted
    needs: iac-scan
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://shopmart.yourdomain.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FRONTEND_TAG="${{ github.event.inputs.frontend_tag }}"
            BACKEND_TAG="${{ github.event.inputs.backend_tag }}"
          else
            FRONTEND_TAG=$(echo "${{ github.sha }}" | cut -c1-8)
            BACKEND_TAG=$(echo "${{ github.sha }}" | cut -c1-8)
          fi
          echo "frontend_tag=${FRONTEND_TAG}" >> $GITHUB_OUTPUT
          echo "backend_tag=${BACKEND_TAG}" >> $GITHUB_OUTPUT
          echo "frontend_image=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${FRONTEND_TAG}" >> $GITHUB_OUTPUT
          echo "backend_image=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${BACKEND_TAG}" >> $GITHUB_OUTPUT

      - name: Login to Azure
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}"
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Verify cluster connectivity
        run: kubectl cluster-info

      - name: Apply namespace and RBAC
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply ConfigMaps
        run: kubectl apply -f k8s/configmaps/ -n ${{ env.NAMESPACE }}

      - name: Update K8s Secrets from GitHub Secrets
        run: |
          kubectl create secret generic ecommerce-secrets \
            --namespace ${{ env.NAMESPACE }} \
            --from-literal=sql-connection-string="${{ secrets.SQL_CONNECTION_STRING }}" \
            --from-literal=jwt-secret-key="${{ secrets.JWT_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret docker-registry acr-pull-secret \
            --namespace ${{ env.NAMESPACE }} \
            --docker-server="${{ secrets.ACR_LOGIN_SERVER }}" \
            --docker-username="${{ secrets.ACR_USERNAME }}" \
            --docker-password="${{ secrets.ACR_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy frontend to AKS
        run: |
          # Replace image tag in deployment manifest
          sed "s|IMAGE_TAG_PLACEHOLDER|${{ steps.resolve.outputs.frontend_image }}|g" \
            k8s/frontend/deployment.yaml | kubectl apply -f - -n ${{ env.NAMESPACE }}

          kubectl apply -f k8s/frontend/service.yaml -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/frontend/hpa.yaml -n ${{ env.NAMESPACE }}

      - name: Deploy backend to AKS
        run: |
          sed "s|IMAGE_TAG_PLACEHOLDER|${{ steps.resolve.outputs.backend_image }}|g" \
            k8s/backend/deployment.yaml | kubectl apply -f - -n ${{ env.NAMESPACE }}

          kubectl apply -f k8s/backend/service.yaml -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/backend/hpa.yaml -n ${{ env.NAMESPACE }}

      - name: Apply Ingress & PodDisruptionBudgets
        run: |
          kubectl apply -f k8s/ingress/ -n ${{ env.NAMESPACE }}
          kubectl apply -f k8s/pdb.yaml -n ${{ env.NAMESPACE }}

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/ecommerce-frontend \
            -n ${{ env.NAMESPACE }} \
            --timeout=300s

      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/ecommerce-backend \
            -n ${{ env.NAMESPACE }} \
            --timeout=300s

      - name: Verify pods are running
        run: |
          echo "=== Frontend pods ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=ecommerce-frontend
          echo "=== Backend pods ==="
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=ecommerce-backend
          echo "=== Services ==="
          kubectl get svc -n ${{ env.NAMESPACE }}
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.NAMESPACE }}

      - name: Smoke test — backend health check
        run: |
          BACKEND_IP=$(kubectl get svc ecommerce-backend-svc \
            -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "pending")
          echo "Backend IP: ${BACKEND_IP}"
          # Wait for public IP if needed
          for i in {1..10}; do
            if kubectl get svc ecommerce-backend-svc -n ${{ env.NAMESPACE }} \
                -o jsonpath='{.status.loadBalancer.ingress[0].ip}' | grep -E '^[0-9]'; then
              break
            fi
            echo "Waiting for LoadBalancer IP... (${i}/10)"
            sleep 15
          done

      - name: Store deployment info to Nexus
        run: |
          cat > deployment-info.json <<EOF
          {
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "frontendImage": "${{ steps.resolve.outputs.frontend_image }}",
            "backendImage": "${{ steps.resolve.outputs.backend_image }}",
            "gitSha": "${{ github.sha }}",
            "gitRef": "${{ github.ref }}",
            "environment": "${{ github.event.inputs.environment || 'production' }}",
            "deployedBy": "${{ github.actor }}"
          }
          EOF
          curl --fail --silent --show-error \
            --user "${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }}" \
            --upload-file deployment-info.json \
            "${{ secrets.NEXUS_URL }}/repository/ecommerce-releases/deployments/$(date +%Y%m%d-%H%M%S)-deployment.json"

      - name: Notify Slack — Deploy Success
        if: success()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "🚀 *Deployment Successful* — `${{ github.event.inputs.environment || 'production' }}`\nFrontend: `${{ steps.resolve.outputs.frontend_tag }}`\nBackend: `${{ steps.resolve.outputs.backend_tag }}`\nDeployed by: `${{ github.actor }}`"
            }'

      - name: Notify Slack — Deploy Failure / Rollback
        if: failure()
        run: |
          echo "Deployment failed — initiating rollback..."
          kubectl rollout undo deployment/ecommerce-frontend -n ${{ env.NAMESPACE }} || true
          kubectl rollout undo deployment/ecommerce-backend -n ${{ env.NAMESPACE }} || true
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "⚠️ *Deployment FAILED — Auto-Rollback Initiated* — `${{ github.event.inputs.environment || 'production' }}`\nCheck: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

  # ─────────────────────────────────────────────────────────────────────────────
  # Post-Deploy DAST with OWASP ZAP
  # ─────────────────────────────────────────────────────────────────────────────
  dast-scan:
    name: DAST — OWASP ZAP Scan
    runs-on: self-hosted
    needs: deploy
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for application to be reachable
        run: sleep 60

      - name: Run OWASP ZAP Baseline Scan (Frontend)
        run: |
          docker run --rm \
            -v "$(pwd)/zap-reports:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "https://shopmart.yourdomain.com" \
            -r zap-frontend-report.html \
            -J zap-frontend-report.json \
            -x zap-frontend-report.xml \
            -I \
            --hook=/zap/auth_hook.py || true

      - name: Run OWASP ZAP API Scan (Backend)
        run: |
          docker run --rm \
            -v "$(pwd)/zap-reports:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
            -t "https://api.shopmart.yourdomain.com/swagger/v1/swagger.json" \
            -f openapi \
            -r zap-api-report.html \
            -J zap-api-report.json \
            -I || true

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-reports
          path: zap-reports/

      - name: Check for High/Critical ZAP findings
        run: |
          HIGH_COUNT=$(cat zap-reports/zap-frontend-report.json 2>/dev/null | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          alerts = data.get('site', [{}])[0].get('alerts', [])
          high = sum(1 for a in alerts if a.get('riskcode') in ['3', '4'])
          print(high)
          " 2>/dev/null || echo "0")
          echo "High/Critical ZAP findings: ${HIGH_COUNT}"
          if [ "${HIGH_COUNT}" -gt "5" ]; then
            echo "Too many high/critical DAST findings — notifying security team"
            curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-type: application/json' \
              --data "{\"text\": \"🔴 *DAST Alert* — ${HIGH_COUNT} High/Critical vulnerabilities found in ZAP scan!\nEnvironment: \`${{ github.event.inputs.environment || 'production' }}\`\nReview ZAP reports in GitHub Actions artifacts.\"}"
          fi
