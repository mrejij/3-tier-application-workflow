apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: ecommerce
data:
  # Replace with your Azure API management or backend domain
  API_BASE_URL: "https://api.shopmart.example.com/api"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ecommerce
data:
  KEY_VAULT_URI: "https://shopmart-kv-prod.vault.azure.net/"   # Replace with your Key Vault URI
  FRONTEND_URL:  "https://shopmart.example.com"                # Replace with your frontend domain
  Jwt__Issuer:   "shopmart-api"
  Jwt__Audience: "shopmart-clients"
  Pagination__DefaultPageSize: "12"
  Pagination__MaxPageSize: "50"
