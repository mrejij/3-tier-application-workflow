apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: ecommerce
data:
  # Port-forwarded backend: kubectl port-forward svc/backend-svc 8081:80 -n ecommerce
  API_BASE_URL: "http://localhost:8081/api"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ecommerce
data:
  FRONTEND_URL:  "http://localhost:8080"
  Jwt__Issuer:   "shopmart-api"
  Jwt__Audience: "shopmart-clients"
  Pagination__DefaultPageSize: "12"
  Pagination__MaxPageSize: "50"
