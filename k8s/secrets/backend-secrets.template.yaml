# ── IMPORTANT ────────────────────────────────────────────────────────────────
# DO NOT commit real secrets to Git. This is a TEMPLATE only.
# In production, secrets are injected via:
#   1. Azure Key Vault + AKS Workload Identity (recommended)
#   2. External Secrets Operator
#   3. Sealed Secrets (Bitnami)
#
# To create from CLI (values sourced from Key Vault / pipeline):
#   kubectl create secret generic backend-secrets \
#     --namespace ecommerce \
#     --from-literal=SQL_CONNECTION_STRING="<value>" \
#     --from-literal=JWT_SECRET_KEY="<value>" \
#     --from-literal=APPINSIGHTS_CONNECTION_STRING="<value>"
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: ecommerce
  annotations:
    # Managed by External Secrets Operator — do not edit manually
    externalsecrets.io/managed: "true"
type: Opaque
stringData:
  SQL_CONNECTION_STRING: "REPLACE_AT_DEPLOY_TIME"
  JWT_SECRET_KEY: "REPLACE_AT_DEPLOY_TIME"
  APPINSIGHTS_CONNECTION_STRING: "REPLACE_AT_DEPLOY_TIME"
