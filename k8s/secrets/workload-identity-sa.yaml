# ── AKS Workload Identity — Service Account ───────────────────────────────────
# This allows the backend pod to authenticate to Azure Key Vault
# without storing any credentials in the cluster.
#
# Setup steps:
#   1. Enable OIDC issuer on AKS: az aks update --enable-oidc-issuer
#   2. Create managed identity and federate with the service account below
#   3. Grant Key Vault Secrets User role to the managed identity
#   See: docs/build-server-setup.md for full commands
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-workload-identity-sa
  namespace: ecommerce
  annotations:
    azure.workload.identity/client-id: "REPLACE_WITH_MANAGED_IDENTITY_CLIENT_ID"
  labels:
    azure.workload.identity/use: "true"
